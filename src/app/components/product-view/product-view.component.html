<ion-content  [fullscreen]="true">

  <!-- Image Slider -->
  <swiper-container [slidesPerView]="1" [pagination]="true">
    <swiper-slide *ngFor="let img of images">
      <img [src]="img" style="width: 100%; height: 300px; object-fit: contain;" />
    </swiper-slide>
  </swiper-container>

  <div class="product-info ion-padding">

    <!-- Badge + Wishlist -->
    <div class="badge-row">
      <ion-badge color="dark">NEW</ion-badge>
      <ion-button fill="clear" class="wishlist-btn">
        <ion-icon name="heart-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </div>

    <!-- Title -->
    <h2 class="product-title">THE MONSTERS × FIFA SERIES - Bottle Opener Fridge Magnet Blind Box</h2>

    <!-- Price -->
    <p class="product-price">₱600.00</p>

    <!-- Size Selector -->
    <p class="section-label">SIZE</p>
    <div class="size-options">
      <ion-button
        *ngFor="let size of sizes"
        [fill]="selectedSize === size.value ? 'solid' : 'outline'"
        [color]="selectedSize === size.value ? 'dark' : 'medium'"
        (click)="selectedSize = size.value"
        class="size-btn">
        <img [src]="size.icon" slot="start" style="height: 20px;" />
        {{ size.label }}
      </ion-button>
    </div>

    <!-- Quantity -->
    <p class="section-label">Quantity</p>
    <div class="quantity-row">
      <ion-button fill="outline" color="dark" (click)="decreaseQty()">-</ion-button>
      <span class="qty-value">{{ quantity }}</span>
      <ion-button fill="outline" color="dark" (click)="increaseQty()">+</ion-button>
    </div>

    <!-- Blind Box Hint -->
    <div class="hint-banner">
      <ion-icon name="cube-outline"></ion-icon>
      <div>
        <p class="hint-title">New way to explore blind box</p>
        <p class="hint-sub">Pick A Box ---- Shake for Hints ---- Unbox Now</p>
      </div>
      <ion-icon name="arrow-forward-outline"></ion-icon>
    </div>

  </div>

</ion-content>
 <ion-toast
    trigger="open-toast"
    message="Successfully added to cart!"
    [duration]="3000"
    icon="bag-check-outline"
  ></ion-toast>
<!-- Sticky Footer Buttons -->
<ion-footer>
  <ion-toolbar>
    <div class="footer-btns">
      <ion-button id="open-toast" expand="block" fill="solid" color="dark" class="cart-btn" (click)="addToCart()">
        ADD TO CART
      </ion-button>
      <ion-button expand="block" fill="solid" color="danger" class="buy-btn" (click)="buyNow()">
        BUY NOW
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
